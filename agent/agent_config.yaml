agent:
  # Jinja2 system prompt template (relative to agent/prompts/)
  system_template: "system_prompt.j2"

  # Template for formatting the task/issue for the agent.
  # Available variables: {{task}}
  instance_template: |
    <issue_description>
    {{task}}
    </issue_description>

    <environment>
    Your working directory is the project root. Do NOT use /testbed or any absolute paths.
    Source code is in the `src/` subdirectory. Use relative paths (e.g. `src/module.py`).
    </environment>

    <instructions>
    Read the issue above carefully.

    Follow this workflow:
    1. Read and understand the relevant source files in `src/`
    2. Identify the root cause of the bug
    3. Fix the bug using `smart_editor` (replace or patch command)
    4. Verify your fix by running a small test script with `bash`
    5. Call `submit` with a short explanation of what you changed

    CRITICAL: You MUST edit the source files with `smart_editor` BEFORE calling `submit`.
    Submitting without making changes means the task is NOT solved.
    Do NOT look for or try to run any test files — there are none in your workspace.
    Do NOT create new source files — only modify existing ones.
    </instructions>

  # Max steps before the agent is stopped
  step_limit: 30

  # Max cost in USD before the agent is stopped (0 = unlimited)
  cost_limit: 0

  # Whitelist of tools available to the agent.
  # SWE-bench mode: no think/finish — agent works through bash, grep, smart_read, submit.
  tools:
    - bash
    - grep
    - smart_read
    - smart_editor
    - submit
